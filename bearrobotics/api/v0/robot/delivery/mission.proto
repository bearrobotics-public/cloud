syntax = "proto3";

import "bearrobotics/api/v0/robot/robot.proto";
import "google/protobuf/any.proto";

package bearrobotics.api.v0.robot.delivery;

enum AutoOneOffMissionParam {
    UNKNOWN = 0;
    LOOP = 1;
    DOWHATEVER = 3;
  }
  
  // Represents a mission type specific to serving robots.
  message AutoOneOffMission {
    robot.Mission base = 1;
    AutoOneOffMissionParam params = 2; 
  }
  
syntax = "proto3";

import "bearrobotics/api/v0/robot/robot.proto";
import "google/protobuf/any.proto";

package bearrobotics.api.v0.robot.serving;

enum LoopMissionParam {
  UNKNOWN = 0;
  LOOP = 1;
  TRAVERSE = 2;
  WAIT = 3;
}

// Represents a mission type specific to serving robots.
message LoopMission {
  robot.Mission base = 1;
  LoopMissionParam params = 2; 
}

enum TraverseMissionParam {
  UNKNOWN = 0;
  LOOP = 1;
  DOWHATEVER = 3;
}

// Represents a mission type specific to serving robots.
message TraverseMission {
  robot.Mission base = 1;
  TraverseMissionParam params = 2; 
}

site_name: Bear Cloud API
site_url: https://bearrobotics-public.github.io/cloud/
copyright: Copyright 2025 Bear Robotics, Inc. All rights reserved.
theme:
  name: material
  features:
    - content.code.copy
    - content.tooltips
    - navigation.top
    - navigation.tracking
    - navigation.tabs
    - toc.follow
  palette:
    primary: custom
  favicon: assets/favicon.png
  logo: assets/bear_logo_white.png
extra_css:
    - stylesheets/extra.css
markdown_extensions:
  - toc:
      permalink: True
      toc_depth: 4
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
nav:
  - Concepts:
    - Overview: concepts/overview.md
    - Mission: concepts/mission.md
  - API Reference:
    - v1.0:
      - Services:
        - API Service: v1.0/services/ApiService.md
      - Message Types:
        - Mission Commands:
          - Goal: v1.0/core/mission/Goal.md
          - Mission: v1.0/core/mission/Mission.md
          - Mission Status: v1.0/core/mission/MissionStatus.md
        - Maps & Locations:
          - Annotation: v1.0/core/location/Annotation.md
          - Map: v1.0/core/location/Map.md
        - Navigation & Localization:
          - Localization: v1.0/core/navigation/Localization.md
          - Pose: v1.0/core/navigation/Pose.md
        - Robot Status:
          - Battery: v1.0/core/status/Battery.md
          - Status: v1.0/core/status/Status.md
        - Fleet Management:
          - Selector: v1.0/core/fleet/Selector.md
        - Common:
          - Metadata: v1.0/core/common/Metadata.md
      - Extension:
        - Carti robot family:
          - Mission: v1.0/carti/mission/Mission.md
        - Servi robot family:
          - Mission: v1.0/servi/mission/Mission.md
          - Tray: v1.0/servi/tray/Status.md  
    - v0.1:
      - Services:
        - API Service: v0.1/cloud/CloudApiService.md
      - Message Types:
        - Cloud:
          - Config: v0.1/cloud/Config.md
          - Profiles: v0.1/cloud/Profiles.md
          - Robot Settings: v0.1/cloud/RobotSettings.md
          - Robot Status: v0.1/cloud/RobotStatus.md
        - Common:
          - Annotations: v0.1/common/Annotations.md
          - Math: v0.1/common/Math.md
        - Location:
          - Annotation: v0.1/location/Annotation.md
          - Location: v0.1/location/Location.md
          - Map: v0.1/location/Map.md
          - Types: v0.1/location/Types.md
          - Zones: v0.1/location/Zones.md
        - Robot:
          - Localization: v0.1/robot/Localization.md
          - Mission: v0.1/robot/Mission.md
          - Robot: v0.1/robot/Robot.md
          - Status: v0.1/robot/Status.md
  - Guides:
    - Setup:
      - Authentication: guides/setup/authentication.md
      - Examples: 
        - Python: guides/examples/python.md
        - Golang: guides/examples/golang.md
    - Troubleshooting: guides/troubleshooting.md
  - Changelog: changelog.md
  - Roadmap: roadmap.md
